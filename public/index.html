<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Lesevennen</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #FAF7F2; --warm: #F0E8D8;
    --ink: #2C2416; --ink-soft: #6B5E4A;
    --accent: #C4622D; --green: #4A7C59; --green-light: #D4E8DC;
    --red: #C0392B; --red-light: #FDECEA;
    --shadow: rgba(44,36,22,0.12);
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream); color: var(--ink);
    display: flex; flex-direction: column;
    background-image:
      radial-gradient(ellipse at 15% 0%, rgba(196,98,45,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 100%, rgba(74,124,89,0.07) 0%, transparent 50%);
  }

  header { text-align: center; padding: 0.8rem 1rem 0.5rem; flex-shrink: 0; }
  header h1 { font-family: 'Lora', serif; font-size: 1.5rem; letter-spacing: -0.02em; }
  header h1 span { color: var(--accent); font-style: italic; }
  header p { color: var(--ink-soft); font-size: 0.78rem; font-weight: 300; margin-top: 0.1rem; }

  /* STATUS BAR - norsk stavekontroll info */
  .spell-status {
    display: flex; align-items: center; justify-content: center;
    gap: 0.5rem; padding: 0.3rem 1rem;
    font-size: 0.75rem; color: var(--ink-soft);
    background: white; border-bottom: 1px solid rgba(44,36,22,0.07);
    flex-shrink: 0; min-height: 28px;
  }
  .spell-status.loading { color: var(--ink-soft); }
  .spell-status.ready   { color: var(--green); }
  .spell-status.errors  { color: var(--red); font-weight: 600; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

  /* EDITOR */
  .editor-wrap { flex: 1; overflow: hidden; position: relative; }
  .editor-bg   { position: absolute; inset: 0; background: white; z-index: 0; }

  /* Highlight overlay – shows red underlines, transparent text */
  #editor-hl {
    position: absolute; inset: 0; z-index: 1;
    padding: 1.1rem; overflow-y: auto; overflow-x: hidden;
    font-family: 'Lora', serif; font-size: 1.05rem; line-height: 1.85;
    white-space: pre-wrap; word-wrap: break-word;
    color: transparent; pointer-events: none;
  }
  .hl-err {
    background: #FFE5E2;
    border-bottom: 2.5px solid var(--red);
    border-radius: 2px;
    color: transparent;
    cursor: pointer;
    pointer-events: all;
  }

  /* Actual textarea on top */
  #editor {
    position: absolute; inset: 0; z-index: 2;
    padding: 1.1rem;
    font-family: 'Lora', serif; font-size: 1.05rem; line-height: 1.85;
    color: var(--ink); background: transparent;
    -webkit-text-fill-color: var(--ink);
    border: none; outline: none; resize: none;
    -webkit-overflow-scrolling: touch;
    caret-color: var(--accent);
    spellcheck: false;
  }
  #editor::placeholder { color: #C4B8A6; font-style: italic; -webkit-text-fill-color: #C4B8A6; }

  /* Speaking bar */
  .speaking-bar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    background: var(--green-light); color: var(--green);
    font-size: 0.82rem; font-weight: 500;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    padding: 0.5rem;
    transform: translateY(-100%); transition: transform 0.25s ease;
    border-bottom: 1px solid rgba(74,124,89,0.2);
  }
  .speaking-bar.active { transform: translateY(0); }
  .wave { display: inline-flex; align-items: flex-end; gap: 2px; height: 13px; }
  .wave span { display: block; width: 3px; background: var(--green); border-radius: 2px; animation: wave 0.9s ease-in-out infinite; }
  .wave span:nth-child(1) { height: 5px;  animation-delay: 0s; }
  .wave span:nth-child(2) { height: 11px; animation-delay: 0.15s; }
  .wave span:nth-child(3) { height: 7px;  animation-delay: 0.3s; }
  .wave span:nth-child(4) { height: 13px; animation-delay: 0.1s; }
  .wave span:nth-child(5) { height: 5px;  animation-delay: 0.25s; }

  /* Word popup */
  .popup {
    position: fixed; z-index: 200;
    background: white; border-radius: 16px;
    box-shadow: 0 8px 32px rgba(44,36,22,0.2), 0 2px 8px rgba(44,36,22,0.1);
    padding: 1rem 1.1rem 0.8rem; min-width: 210px; max-width: 280px;
    border: 1.5px solid rgba(44,36,22,0.07);
    display: none;
  }
  .popup.show { display: block; }
  .popup-word {
    font-family: 'Lora', serif; font-size: 1.05rem; font-weight: 600;
    color: var(--red); margin-bottom: 0.6rem;
    display: flex; align-items: center; gap: 0.4rem;
  }
  .popup-close {
    position: absolute; top: 0.5rem; right: 0.8rem;
    background: none; border: none; font-size: 1.1rem;
    cursor: pointer; color: var(--ink-soft); line-height: 1;
    padding: 0.2rem;
  }
  .popup-btn {
    display: block; width: 100%;
    padding: 0.5rem 0.7rem; margin-bottom: 0.35rem;
    border-radius: 10px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500;
    cursor: pointer; text-align: left; transition: opacity 0.15s;
  }
  .popup-btn:active { opacity: 0.75; }
  .popup-btn.listen { background: var(--accent); color: white; }
  .popup-btn.suggest { background: var(--green-light); color: #2d5a3d; }
  .popup-btn.ignore  { background: var(--cream); color: var(--ink-soft); margin-bottom: 0; }

  /* Bottom bar */
  .bottom-bar {
    flex-shrink: 0; background: var(--warm);
    border-top: 1px solid rgba(44,36,22,0.1);
    padding: 0.65rem 0.8rem;
    padding-bottom: max(0.65rem, env(safe-area-inset-bottom));
  }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.45rem; margin-bottom: 0.5rem; }
  .btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 0.2rem; padding: 0.6rem 0.3rem;
    border: none; border-radius: 14px;
    font-family: 'DM Sans', sans-serif; font-size: 0.73rem; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .btn:active { transform: scale(0.94); }
  .btn:disabled { opacity: 0.35; pointer-events: none; }
  .btn-primary  { background: var(--accent); color: white; box-shadow: 0 2px 10px rgba(196,98,45,0.3); }
  .btn-secondary { background: white; color: var(--ink); border: 1.5px solid rgba(44,36,22,0.15); }
  .btn-stop { grid-column: span 3; flex-direction: row; padding: 0.6rem; background: var(--red); color: white; gap: 0.4rem; }

  .speed-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.4rem; }
  .speed-row label { font-size: 0.76rem; color: var(--ink-soft); font-weight: 500; white-space: nowrap; }
  .speed-row input[type="range"] { flex: 1; accent-color: var(--accent); height: 28px; cursor: pointer; }
  .speed-val { font-size: 0.8rem; font-weight: 600; color: var(--ink); min-width: 32px; text-align: right; }

  .stats-row { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--ink-soft); }

  @keyframes wave { 0%,100%{transform:scaleY(0.5)} 50%{transform:scaleY(1)} }
  @keyframes spin  { to{transform:rotate(360deg)} }
  .spinner { display:inline-block;width:8px;height:8px;border:1.5px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite; }
</style>
</head>
<body>

<header>
  <h1>Lese<span>vennen</span></h1>
  <p>Skriv – trykk på røde ord for å høre uttalen</p>
</header>

<div class="spell-status loading" id="spell-status">
  <span class="spinner"></span> Laster norsk ordbok…
</div>

<div class="editor-wrap">
  <div class="speaking-bar" id="speaking-bar">
    <span class="wave"><span></span><span></span><span></span><span></span><span></span></span>
    Leser opp…
  </div>
  <div class="editor-bg"></div>
  <div id="editor-hl" aria-hidden="true"></div>
  <textarea id="editor"
    placeholder="Skriv her…"
    spellcheck="false" autocorrect="off" autocapitalize="sentences" lang="no">
  </textarea>
</div>

<div class="popup" id="popup">
  <button class="popup-close" id="popup-close">×</button>
  <div class="popup-word" id="popup-word"></div>
  <div id="popup-actions"></div>
</div>

<div class="bottom-bar">
  <div class="btn-row" id="main-btns">
    <button class="btn btn-primary" id="btn-all">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Les alt
    </button>
    <button class="btn btn-secondary" id="btn-sel">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Markert
    </button>
    <button class="btn btn-secondary" id="btn-last">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Siste
    </button>
  </div>
  <div class="btn-row" id="stop-row" style="display:none">
    <button class="btn btn-stop" id="btn-stop">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12"/></svg>
      Stopp opplesning
    </button>
  </div>
  <div class="speed-row">
    <label>Hastighet</label>
    <input type="range" id="speed" min="0.7" max="1.3" step="0.05" value="1.0">
    <span class="speed-val" id="speed-val">1.0×</span>
  </div>
  <div class="stats-row">
    <span id="wc">0 ord</span>
    <span id="ec" style="color:var(--red);font-weight:600;display:none" id="ec"></span>
    <span id="cc">0 tegn</span>
  </div>
</div>

<script>
// ── DOM ──
const editor     = document.getElementById('editor');
const editorHl   = document.getElementById('editor-hl');
const spellSt    = document.getElementById('spell-status');
const speakBar   = document.getElementById('speaking-bar');
const popup      = document.getElementById('popup');
const popupWord  = document.getElementById('popup-word');
const popupActs  = document.getElementById('popup-actions');
const popupClose = document.getElementById('popup-close');
const btnAll     = document.getElementById('btn-all');
const btnSel     = document.getElementById('btn-sel');
const btnLast    = document.getElementById('btn-last');
const btnStop    = document.getElementById('btn-stop');
const mainBtns   = document.getElementById('main-btns');
const stopRow    = document.getElementById('stop-row');
const speedEl    = document.getElementById('speed');
const speedVal   = document.getElementById('speed-val');
const wcEl       = document.getElementById('wc');
const ccEl       = document.getElementById('cc');
const ecEl       = document.getElementById('ec');

let typo        = null;
let errors      = [];   // [{word, index, suggestions}]
let spellTimer  = null;
let currentAudio = null;
let isSpeaking  = false;
const ignored   = new Set();

// ── Load Norwegian dictionary ──
async function loadDict() {
  try {
    const [affRes, dicRes] = await Promise.all([
      fetch('https://raw.githubusercontent.com/wooorm/dictionaries/main/dictionaries/nb/index.aff'),
fetch('https://raw.githubusercontent.com/wooorm/dictionaries/main/dictionaries/nb/index.dic')
    ]);
    if (!affRes.ok || !dicRes.ok) throw new Error('CDN feil');
    const [aff, dic] = await Promise.all([affRes.text(), dicRes.text()]);

    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/typo-js@1.2.3/typo.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });

    typo = new Typo('nb_NO', aff, dic, { platform: 'any' });
    spellSt.className = 'spell-status ready';
    spellSt.innerHTML = '<span class="dot"></span> Norsk stavekontroll klar';
    runSpellCheck();
  } catch (e) {
    spellSt.className = 'spell-status';
    spellSt.textContent = 'Stavekontroll utilgjengelig';
  }
}
loadDict();

// ── Spellcheck ──
function runSpellCheck() {
  if (!typo) return;
  const text = editor.value;
  const errs = [];
  const re = /\b([a-zA-ZæøåÆØÅ]+(?:[-'][a-zA-ZæøåÆØÅ]+)*)\b/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    const w = m[0];
    if (w.length < 2) continue;
    if (/^\d/.test(w)) continue;
    if (ignored.has(w.toLowerCase())) continue;
    if (!typo.check(w) && !typo.check(w.toLowerCase())) {
      errs.push({ word: w, index: m.index, suggestions: typo.suggest(w).slice(0, 4) });
    }
  }
  errors = errs;
  renderHighlights();
  updateErrorCount();
}

function renderHighlights() {
  const text = editor.value;
  if (!errors.length) { editorHl.innerHTML = esc(text); return; }

  const sorted = [...errors].sort((a,b) => a.index - b.index);
  let out = '', last = 0;
  for (const e of sorted) {
    out += esc(text.slice(last, e.index));
    out += `<span class="hl-err" data-word="${esc(e.word)}" data-idx="${e.index}">${esc(e.word)}</span>`;
    last = e.index + e.word.length;
  }
  out += esc(text.slice(last));
  editorHl.innerHTML = out;

  editorHl.querySelectorAll('.hl-err').forEach(el => {
    el.addEventListener('pointerdown', ev => {
      ev.preventDefault();
      ev.stopPropagation();
      const w   = el.dataset.word;
      const idx = parseInt(el.dataset.idx);
      const err = errors.find(e => e.word === w && e.index === idx);
      showPopup(w, err?.suggestions || [], el);
    });
  });
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function updateErrorCount() {
  if (errors.length > 0) {
    ecEl.textContent = errors.length + ' stavefeil';
    ecEl.style.display = 'inline';
    spellSt.className = 'spell-status errors';
    spellSt.innerHTML = `<span class="dot"></span> ${errors.length} ord med mulig stavefeil – trykk på rødt ord`;
  } else {
    ecEl.style.display = 'none';
    if (typo) {
      spellSt.className = 'spell-status ready';
      spellSt.innerHTML = '<span class="dot"></span> Ingen stavefeil funnet';
    }
  }
}

// ── Popup ──
function showPopup(word, suggestions, anchor) {
  popupWord.textContent = '⚠ ' + word;
  popupActs.innerHTML = '';

  // Hør uttalen
  const btnListen = document.createElement('button');
  btnListen.className = 'popup-btn listen';
  btnListen.textContent = '🔊 Hør uttalen av «' + word + '»';
  btnListen.onclick = () => { speak(word); closePopup(); };
  popupActs.appendChild(btnListen);

  // Forslag
  suggestions.forEach(s => {
    const b = document.createElement('button');
    b.className = 'popup-btn suggest';
    b.textContent = '✓ Bytt med: ' + s;
    b.onclick = () => { replaceWord(word, suggestions.indexOf(s) < 0 ? s : s, parseInt(anchor.dataset.idx)); closePopup(); };
    popupActs.appendChild(b);
  });

  // Ignorer
  const btnIgn = document.createElement('button');
  btnIgn.className = 'popup-btn ignore';
  btnIgn.textContent = 'Ignorer dette ordet';
  btnIgn.onclick = () => { ignored.add(word.toLowerCase()); errors = errors.filter(e => e.word.toLowerCase() !== word.toLowerCase()); renderHighlights(); updateErrorCount(); closePopup(); };
  popupActs.appendChild(btnIgn);

  // Posisjon
  const r = anchor.getBoundingClientRect();
  popup.style.top  = Math.min(r.bottom + 6, window.innerHeight - 280) + 'px';
  popup.style.left = Math.max(8, Math.min(r.left, window.innerWidth - 290)) + 'px';
  popup.classList.add('show');
}

function closePopup() { popup.classList.remove('show'); }
popupClose.addEventListener('click', closePopup);
document.addEventListener('pointerdown', e => { if (!popup.contains(e.target)) closePopup(); });

function replaceWord(oldWord, newWord, idx) {
  const t = editor.value;
  editor.value = t.slice(0, idx) + newWord + t.slice(idx + oldWord.length);
  updateStats();
  runSpellCheck();
}

// ── Sync scroll ──
editor.addEventListener('scroll', () => { editorHl.scrollTop = editor.scrollTop; });

// ── Input ──
editor.addEventListener('input', () => {
  updateStats();
  clearTimeout(spellTimer);
  spellTimer = setTimeout(runSpellCheck, 900);
});

function updateStats() {
  const t = editor.value.trim();
  wcEl.textContent = (t ? t.split(/\s+/).filter(Boolean).length : 0) + ' ord';
  ccEl.textContent = editor.value.length + ' tegn';
}

// ── Speed ──
speedEl.addEventListener('input', () => {
  const v = parseFloat(speedEl.value);
  speedVal.textContent = v.toFixed(v % 1 === 0 ? 0 : 1) + '×';
});

// ── TTS ──
async function speak(text) {
  text = text.trim();
  if (!text) { alert('Ingen tekst å lese.'); return; }
  if (isSpeaking) return;
  setSpeaking(true);
  try {
    const res = await fetch('/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, voiceId: 'b3jcIbyC3BSnaRu8avEk', speed: parseFloat(speedEl.value) })
    });
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error||'Feil'); }
    const url = URL.createObjectURL(await res.blob());
    if (currentAudio) { currentAudio.pause(); URL.revokeObjectURL(currentAudio.src); }
    currentAudio = new Audio(url);
    currentAudio.play();
    currentAudio.onended = () => { URL.revokeObjectURL(url); setSpeaking(false); };
    currentAudio.onerror = () => setSpeaking(false);
  } catch(e) { setSpeaking(false); alert('Feil: ' + e.message); }
}

function setSpeaking(on) {
  isSpeaking = on;
  speakBar.classList.toggle('active', on);
  mainBtns.style.display = on ? 'none' : 'grid';
  stopRow.style.display  = on ? 'grid' : 'none';
}

btnAll.addEventListener('click',  () => speak(editor.value));
btnSel.addEventListener('click',  () => {
  const s = editor.value.substring(editor.selectionStart, editor.selectionEnd).trim();
  s ? speak(s) : alert('Marker tekst og trykk «Markert».');
});
btnLast.addEventListener('click', () => {
  const t = editor.value.trim();
  if (!t) return;
  const parts = t.match(/[^.!?\n]+[.!?\n]?/g) || [t];
  speak(parts[parts.length-1]);
});
btnStop.addEventListener('click', () => {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  setSpeaking(false);
});

updateStats();
editor.value = '';
</script>
</body>
</html>
