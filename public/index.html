<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Lesevennen</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FAF7F2;
    --warm: #F0E8D8;
    --ink: #2C2416;
    --ink-soft: #6B5E4A;
    --accent: #C4622D;
    --accent-light: #EDD5C0;
    --green: #4A7C59;
    --green-light: #D4E8DC;
    --red: #C0392B;
    --red-light: #FDECEA;
    --shadow: rgba(44, 36, 22, 0.12);
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    background-image:
      radial-gradient(ellipse at 15% 0%, rgba(196,98,45,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 100%, rgba(74,124,89,0.07) 0%, transparent 50%);
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 1rem 1rem 0.6rem;
    flex-shrink: 0;
  }
  header h1 { font-family: 'Lora', serif; font-size: 1.6rem; letter-spacing: -0.02em; }
  header h1 span { color: var(--accent); font-style: italic; }
  header p { color: var(--ink-soft); font-size: 0.82rem; font-weight: 300; margin-top: 0.1rem; }

  /* VOICE BAR */
  .voice-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    background: white;
    border-bottom: 1px solid rgba(44,36,22,0.08);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .voice-bar label { font-size: 0.78rem; color: var(--ink-soft); font-weight: 500; white-space: nowrap; }
  #voice-select {
    flex: 1;
    min-width: 140px;
    padding: 0.4rem 0.6rem;
    border: 1.5px solid rgba(44,36,22,0.15);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--ink);
    background: var(--cream);
    outline: none;
    -webkit-appearance: none;
  }

  /* EDITOR AREA */
  .editor-wrap {
    flex: 1;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* The visible rich-text div where we show highlights */
  #editor-display {
    position: absolute;
    inset: 0;
    padding: 1.2rem 1.1rem;
    font-family: 'Lora', serif;
    font-size: 1.1rem;
    line-height: 1.85;
    color: transparent; /* text invisible, only highlights show */
    pointer-events: none;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-y: auto;
    z-index: 1;
  }

  .misspelled {
    background: #FFE0DC;
    border-bottom: 2px solid var(--red);
    border-radius: 2px;
    color: transparent;
    cursor: pointer;
    pointer-events: all;
    position: relative;
  }

  /* Actual textarea on top */
  #editor-area {
    position: absolute;
    inset: 0;
    padding: 1.2rem 1.1rem;
    font-family: 'Lora', serif;
    font-size: 1.1rem;
    line-height: 1.85;
    color: var(--ink);
    border: none;
    outline: none;
    background: white;
    resize: none;
    caret-color: var(--accent);
    -webkit-overflow-scrolling: touch;
    z-index: 2;
    /* Make background transparent so highlights show through */
    background: transparent;
    -webkit-text-fill-color: var(--ink);
  }
  #editor-area::placeholder { color: #C4B8A6; font-style: italic; -webkit-text-fill-color: #C4B8A6; }

  /* White base behind everything */
  .editor-bg {
    position: absolute;
    inset: 0;
    background: white;
    z-index: 0;
  }

  /* SPEAKING OVERLAY */
  .speaking-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    background: var(--green-light);
    color: var(--green);
    font-size: 0.82rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.5rem;
    transform: translateY(-100%);
    transition: transform 0.25s ease;
    border-bottom: 1px solid rgba(74,124,89,0.2);
    z-index: 10;
  }
  .speaking-bar.active { transform: translateY(0); }

  .wave { display: inline-flex; align-items: flex-end; gap: 2px; height: 13px; }
  .wave span { display: block; width: 3px; background: var(--green); border-radius: 2px; animation: wave 0.9s ease-in-out infinite; }
  .wave span:nth-child(1) { height: 5px;  animation-delay: 0s; }
  .wave span:nth-child(2) { height: 11px; animation-delay: 0.15s; }
  .wave span:nth-child(3) { height: 7px;  animation-delay: 0.3s; }
  .wave span:nth-child(4) { height: 13px; animation-delay: 0.1s; }
  .wave span:nth-child(5) { height: 5px;  animation-delay: 0.25s; }

  /* SPELL ERROR POPUP */
  .spell-popup {
    position: fixed;
    background: white;
    border-radius: 14px;
    box-shadow: 0 8px 32px rgba(44,36,22,0.18), 0 2px 8px rgba(44,36,22,0.1);
    padding: 0.9rem 1.1rem;
    z-index: 100;
    min-width: 200px;
    max-width: 280px;
    display: none;
    border: 1.5px solid rgba(44,36,22,0.08);
  }
  .spell-popup.visible { display: block; }
  .spell-popup-word {
    font-family: 'Lora', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--red);
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .spell-popup-word::before { content: '⚠️'; font-size: 0.9rem; }
  .spell-popup-actions { display: flex; flex-direction: column; gap: 0.4rem; }
  .spell-btn {
    padding: 0.5rem 0.8rem;
    border-radius: 10px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s;
  }
  .spell-btn-listen { background: var(--accent); color: white; }
  .spell-btn-listen:hover { background: #b0561f; }
  .spell-btn-suggestion { background: var(--green-light); color: var(--green); }
  .spell-btn-suggestion:hover { background: #c0dcca; }
  .spell-btn-dismiss { background: var(--cream); color: var(--ink-soft); }
  .spell-btn-dismiss:hover { background: var(--warm); }
  .spell-popup-close {
    position: absolute; top: 0.5rem; right: 0.7rem;
    background: none; border: none; font-size: 1.1rem;
    cursor: pointer; color: var(--ink-soft); line-height: 1;
  }

  /* BOTTOM CONTROLS */
  .bottom-bar {
    flex-shrink: 0;
    background: var(--warm);
    border-top: 1px solid rgba(44,36,22,0.1);
    padding: 0.7rem 0.8rem;
    padding-bottom: max(0.7rem, env(safe-area-inset-bottom));
  }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.5rem;
    margin-bottom: 0.6rem;
  }

  .btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.25rem;
    padding: 0.65rem 0.3rem;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    letter-spacing: 0.01em;
  }
  .btn:active { transform: scale(0.94); opacity: 0.85; }
  .btn:disabled { opacity: 0.35; pointer-events: none; }
  .btn svg { flex-shrink: 0; }
  .btn-primary   { background: var(--accent); color: white; box-shadow: 0 2px 10px rgba(196,98,45,0.35); }
  .btn-secondary { background: white; color: var(--ink); border: 1.5px solid rgba(44,36,22,0.15); }
  .btn-stop      { grid-column: span 3; flex-direction: row; padding: 0.65rem; background: #c0392b; color: white; box-shadow: 0 2px 10px rgba(192,57,43,0.3); }

  /* SPEED */
  .speed-row { display: flex; align-items: center; gap: 0.6rem; }
  .speed-row label { font-size: 0.78rem; color: var(--ink-soft); font-weight: 500; white-space: nowrap; }
  .speed-row input[type="range"] { flex: 1; accent-color: var(--accent); height: 28px; cursor: pointer; }
  .speed-value { font-size: 0.82rem; font-weight: 600; color: var(--ink); min-width: 34px; text-align: right; }

  /* Status */
  .status-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.4rem 0.2rem 0;
    font-size: 0.75rem;
    color: var(--ink-soft);
  }
  .spell-count {
    color: var(--red);
    font-weight: 600;
    font-size: 0.75rem;
    display: none;
  }
  .spell-count.visible { display: inline; }

  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.35); border-top-color: white;
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }

  @keyframes wave { 0%,100% { transform:scaleY(0.5); } 50% { transform:scaleY(1); } }
  @keyframes spin  { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>Lese<span>vennen</span></h1>
  <p>Skriv – og hør hva du har skrevet</p>
</header>

<div class="voice-bar">
  <label for="voice-select">Stemme:</label>
  <select id="voice-select">
    <option value="XB0fDUnXU5powFXDhCwa">Charlotte – norsk, naturlig (anbefalt)</option>
    <option value="pFZP5JQG7iQjIQuC4Bku">Lily – norsk</option>
    <option value="EXAVITQu4vr4xnSDxMaL">Bella – tydelig</option>
    <option value="21m00Tcm4TlvDq8ikWAM">Rachel – klar</option>
  </select>
</div>

<div class="editor-wrap">
  <div class="speaking-bar" id="speaking-bar">
    <span class="wave"><span></span><span></span><span></span><span></span><span></span></span>
    Leser opp…
  </div>
  <div class="editor-bg"></div>
  <div id="editor-display" aria-hidden="true"></div>
  <textarea id="editor-area"
    placeholder="Skriv her… Feilstavede ord markeres med rød understrek – trykk på dem for å høre uttalen."
    spellcheck="false"
    lang="no"
    autocorrect="off"
    autocapitalize="sentences">
  </textarea>
</div>

<!-- Spell error popup -->
<div class="spell-popup" id="spell-popup">
  <button class="spell-popup-close" id="spell-popup-close">×</button>
  <div class="spell-popup-word" id="spell-popup-word"></div>
  <div class="spell-popup-actions" id="spell-popup-actions"></div>
</div>

<div class="bottom-bar">
  <div class="btn-row" id="main-btns">
    <button class="btn btn-primary" id="btn-read-all">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Les alt
    </button>
    <button class="btn btn-secondary" id="btn-read-selection">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Markert
    </button>
    <button class="btn btn-secondary" id="btn-read-last">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Siste
    </button>
  </div>

  <div class="btn-row" id="stop-row" style="display:none;">
    <button class="btn btn-stop" id="btn-stop">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12"/></svg>
      &nbsp;Stopp opplesning
    </button>
  </div>

  <div class="speed-row">
    <label for="speed-slider">Hastighet</label>
    <input type="range" id="speed-slider" min="0.7" max="1.3" step="0.05" value="1.0">
    <span class="speed-value" id="speed-display">1.0×</span>
  </div>

  <div class="status-row">
    <span id="word-count">0 ord</span>
    <span class="spell-count" id="spell-count"></span>
    <span id="char-count">0 tegn</span>
  </div>
</div>

<script>
  const editor       = document.getElementById('editor-area');
  const editorDisp   = document.getElementById('editor-display');
  const voiceSel     = document.getElementById('voice-select');
  const speedSlider  = document.getElementById('speed-slider');
  const speedDisp    = document.getElementById('speed-display');
  const wordCountEl  = document.getElementById('word-count');
  const charCountEl  = document.getElementById('char-count');
  const spellCountEl = document.getElementById('spell-count');
  const speakingBar  = document.getElementById('speaking-bar');
  const btnReadAll   = document.getElementById('btn-read-all');
  const btnReadSel   = document.getElementById('btn-read-selection');
  const btnReadLast  = document.getElementById('btn-read-last');
  const btnStop      = document.getElementById('btn-stop');
  const mainBtns     = document.getElementById('main-btns');
  const stopRow      = document.getElementById('stop-row');
  const spellPopup   = document.getElementById('spell-popup');
  const spellWord    = document.getElementById('spell-popup-word');
  const spellActions = document.getElementById('spell-popup-actions');
  const spellClose   = document.getElementById('spell-popup-close');

  let currentAudio   = null;
  let isSpeaking     = false;
  let spellErrors    = []; // [{word, index, suggestions}]
  let spellTimer     = null;

  // ── Norsk ordbok via Hunspell-kompatibel API (nettbasert) ──
  // Vi bruker nettleserens innebygde spellcheck via et skjult input-felt
  // og i tillegg vår egen enkle ordsjekk via en nettjeneste

  // Enkel klient-side stavekontroll med nettleser-trick
  // Bruker en skjult contenteditable-div for å hente feilstavede ord
  const spellChecker = document.createElement('div');
  spellChecker.contentEditable = 'true';
  spellChecker.lang = 'nb';
  spellChecker.style.cssText = 'position:absolute;opacity:0;pointer-events:none;left:-9999px;top:-9999px;width:300px;';
  document.body.appendChild(spellChecker);

  async function checkSpelling(text) {
    if (!text.trim()) { spellErrors = []; renderHighlights(); return; }

    // Bruk nettleserens innebygde stavekontroll
    spellChecker.lang = 'nb-NO';
    spellChecker.innerHTML = '';
    spellChecker.textContent = text;

    // Gi nettleseren tid til å behandle
    await new Promise(r => setTimeout(r, 150));

    const errors = [];
    const words = [];
    let match;
    const wordRegex = /\b[\wæøåÆØÅ]+\b/g;

    while ((match = wordRegex.exec(text)) !== null) {
      words.push({ word: match[0], index: match.index });
    }

    // Sjekk hvert ord via et skjult input
    for (const { word, index } of words) {
      if (word.length < 2) continue;
      const isMisspelled = await isWordMisspelled(word);
      if (isMisspelled) {
        errors.push({ word, index, suggestions: [] });
      }
    }

    spellErrors = errors;
    renderHighlights();
    updateSpellCount();
  }

  function isWordMisspelled(word) {
    return new Promise(resolve => {
      // Bruk nettleserens spellcheck ved å sjekke i en contenteditable
      const tmp = document.createElement('span');
      tmp.contentEditable = 'true';
      tmp.lang = 'nb-NO';
      tmp.style.cssText = 'position:fixed;left:-9999px;font-size:16px;';
      tmp.textContent = word;
      document.body.appendChild(tmp);

      setTimeout(() => {
        // Chrome/Safari merker feilstavede ord med en intern klasse
        const hasMisspelling = tmp.querySelector
          ? false
          : false;

        // Alternativ: bruk Selection og checkValidity-trikset
        // Fungerer i moderne nettlesere
        try {
          const sel = window.getSelection();
          const range = document.createRange();
          range.selectNodeContents(tmp);
          sel.removeAllRanges();
          sel.addRange(range);

          // Sjekk om spellcheck-attributtet gir oss noe
          const result = !tmp.spellcheck || document.queryCommandState
            ? document.execCommand('spell', false, null)
            : false;

          sel.removeAllRanges();
        } catch (e) {}

        document.body.removeChild(tmp);

        // Fallback: bruk vår enkle ordliste-sjekk
        resolve(isLikelyMisspelled(word));
      }, 50);
    });
  }

  // Enkel heuristisk sjekk – vi bruker nettleserens spellcheck-API
  // via et textarea-element som er den mest pålitelige metoden
  const spellTextarea = document.createElement('textarea');
  spellTextarea.lang = 'nb-NO';
  spellTextarea.setAttribute('spellcheck', 'true');
  spellTextarea.style.cssText = 'position:fixed;left:-9999px;opacity:0;width:100px;height:40px;font-size:16px;';
  document.body.appendChild(spellTextarea);

  // Cache for å unngå å sjekke samme ord to ganger
  const spellCache = {};

  function isLikelyMisspelled(word) {
    // Hopp over tall, korte ord, egennavn (stor forbokstav)
    if (/^\d+$/.test(word)) return false;
    if (word.length <= 2) return false;
    if (/^[A-ZÆØÅ]/.test(word)) return false; // Egennavn

    // Bruk cache
    if (spellCache[word.toLowerCase()] !== undefined) {
      return spellCache[word.toLowerCase()];
    }

    // Bruk nettleserens innebygde stavekontroll
    // Dette er det mest pålitelige på tvers av nettlesere
    spellTextarea.value = word;
    spellTextarea.focus();
    spellTextarea.select();

    // Moderne nettlesere eksponerer ikke stavekontroll direkte,
    // men vi kan bruke en annen tilnærming
    const result = false; // Standard: anta korrekt, la nettleseren ta seg av resten
    spellCache[word.toLowerCase()] = result;
    return result;
  }

  // ── Bedre tilnærming: bruk nettleserens native spellcheck ──
  // Vi gjør editor-tekstfeltet transparent og bruker en synlig
  // overlay som viser nettleserens egne røde streker PLUSS vår markering

  // Faktisk: la nettleseren sjekke selv via spellcheck=true på editor
  // og vi fanger opp ord som nettleseren markerer

  // Endre strategi: bruk spellcheck=true på editor, og i tillegg
  // sjekk via Typo.js-biblioteket for norsk

  // Last inn nob-ordbok fra CDN
  let typo = null;

  async function loadDictionary() {
    try {
      const [affRes, dicRes] = await Promise.all([
        fetch('https://cdn.jsdelivr.net/npm/dictionary-nb@2.3.0/index.aff'),
        fetch('https://cdn.jsdelivr.net/npm/dictionary-nb@2.3.0/index.dic')
      ]);
      const [aff, dic] = await Promise.all([affRes.text(), dicRes.text()]);

      // Last Typo.js
      await loadScript('https://cdn.jsdelivr.net/npm/typo-js@1.2.3/typo.js');
      typo = new Typo('nb_NO', aff, dic, { platform: 'any' });
      console.log('Norsk ordbok lastet!');
    } catch (e) {
      console.warn('Kunne ikke laste ordbok:', e);
    }
  }

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  loadDictionary();

  // ── Stavekontroll med Typo.js ──
  function runSpellCheck(text) {
    if (!typo || !text.trim()) {
      spellErrors = [];
      renderHighlights();
      updateSpellCount();
      return;
    }

    const errors = [];
    const wordRegex = /\b[\wæøåÆØÅ'-]+\b/g;
    let match;

    while ((match = wordRegex.exec(text)) !== null) {
      const word = match[0];
      if (word.length < 2) continue;
      if (/^\d+$/.test(word)) continue;
      if (/^[A-ZÆØÅ][a-zæøå]+$/.test(word) && word.length > 5) continue; // trolig egennavn

      if (!typo.check(word)) {
        const suggestions = typo.suggest(word).slice(0, 4);
        errors.push({ word, index: match.index, suggestions });
      }
    }

    spellErrors = errors;
    renderHighlights();
    updateSpellCount();
  }

  // ── Render highlights over editor ──
  function renderHighlights() {
    const text = editor.value;
    if (spellErrors.length === 0) {
      editorDisp.innerHTML = escapeHtml(text);
      return;
    }

    let result = '';
    let lastIndex = 0;

    // Sorter etter indeks
    const sorted = [...spellErrors].sort((a, b) => a.index - b.index);

    for (const err of sorted) {
      result += escapeHtml(text.slice(lastIndex, err.index));
      result += `<span class="misspelled" data-word="${escapeHtml(err.word)}" data-index="${err.index}">${escapeHtml(err.word)}</span>`;
      lastIndex = err.index + err.word.length;
    }
    result += escapeHtml(text.slice(lastIndex));
    editorDisp.innerHTML = result;

    // Legg til klikk-hendelser
    editorDisp.querySelectorAll('.misspelled').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const word = el.dataset.word;
        const err  = spellErrors.find(e => e.word === word && e.index == el.dataset.index);
        showSpellPopup(word, err?.suggestions || [], el);
      });
    });
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  function updateSpellCount() {
    if (spellErrors.length > 0) {
      spellCountEl.textContent = `${spellErrors.length} stavefeil`;
      spellCountEl.classList.add('visible');
    } else {
      spellCountEl.classList.remove('visible');
    }
  }

  // ── Spell popup ──
  function showSpellPopup(word, suggestions, anchorEl) {
    spellWord.textContent = word;
    spellActions.innerHTML = '';

    // Les opp-knapp
    const listenBtn = document.createElement('button');
    listenBtn.className = 'spell-btn spell-btn-listen';
    listenBtn.textContent = '🔊 Hør uttalen av "' + word + '"';
    listenBtn.onclick = () => { speak(word); closeSpellPopup(); };
    spellActions.appendChild(listenBtn);

    // Forslag
    if (suggestions.length > 0) {
      suggestions.forEach(sug => {
        const btn = document.createElement('button');
        btn.className = 'spell-btn spell-btn-suggestion';
        btn.textContent = '✓ Bytt ut med: ' + sug;
        btn.onclick = () => {
          replaceWord(word, sug);
          closeSpellPopup();
        };
        spellActions.appendChild(btn);
      });
    }

    // Avvis
    const dismissBtn = document.createElement('button');
    dismissBtn.className = 'spell-btn spell-btn-dismiss';
    dismissBtn.textContent = 'Ignorer';
    dismissBtn.onclick = () => {
      spellErrors = spellErrors.filter(e => e.word !== word);
      renderHighlights();
      updateSpellCount();
      closeSpellPopup();
    };
    spellActions.appendChild(dismissBtn);

    // Posisjon
    const rect = anchorEl.getBoundingClientRect();
    spellPopup.style.left = Math.min(rect.left, window.innerWidth - 300) + 'px';
    spellPopup.style.top  = (rect.bottom + 8) + 'px';
    spellPopup.classList.add('visible');
  }

  function closeSpellPopup() {
    spellPopup.classList.remove('visible');
  }

  spellClose.addEventListener('click', closeSpellPopup);
  document.addEventListener('click', (e) => {
    if (!spellPopup.contains(e.target)) closeSpellPopup();
  });

  function replaceWord(oldWord, newWord) {
    // Finn første forekomst og bytt ut
    const text = editor.value;
    const idx  = text.indexOf(oldWord);
    if (idx === -1) return;
    editor.value = text.slice(0, idx) + newWord + text.slice(idx + oldWord.length);
    triggerSpellCheck();
    updateStats();
  }

  // ── Sync scroll mellom editor og display ──
  editor.addEventListener('scroll', () => {
    editorDisp.scrollTop = editor.scrollTop;
  });

  // ── Spellcheck trigger ──
  function triggerSpellCheck() {
    clearTimeout(spellTimer);
    spellTimer = setTimeout(() => runSpellCheck(editor.value), 800);
  }

  editor.addEventListener('input', () => {
    updateStats();
    triggerSpellCheck();
  });

  function updateStats() {
    const t = editor.value.trim();
    wordCountEl.textContent = (t ? t.split(/\s+/).filter(Boolean).length : 0) + ' ord';
    charCountEl.textContent = editor.value.length + ' tegn';
  }

  // Speed display
  speedSlider.addEventListener('input', () => {
    const v = parseFloat(speedSlider.value);
    speedDisp.textContent = v.toFixed(2).replace(/\.?0+$/, '') + '×';
  });

  // ── TTS via backend ──
  async function speakElevenLabs(text) {
    setSpeaking(true);
    try {
      const res = await fetch('/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          text,
          voiceId: voiceSel.value,
          speed: parseFloat(speedSlider.value)
        })
      });
      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e.error || 'Serverfeil');
      }
      const url = URL.createObjectURL(await res.blob());
      if (currentAudio) { currentAudio.pause(); URL.revokeObjectURL(currentAudio.src); }
      currentAudio = new Audio(url);
      currentAudio.play();
      currentAudio.onended = () => { URL.revokeObjectURL(url); setSpeaking(false); };
      currentAudio.onerror = () => setSpeaking(false);
    } catch (e) {
      setSpeaking(false);
      alert('Feil: ' + e.message);
    }
  }

  function speak(text) {
    text = text.trim();
    if (!text) { alert('Ingen tekst å lese opp.'); return; }
    if (isSpeaking) return;
    speakElevenLabs(text);
  }

  function setSpeaking(on) {
    isSpeaking = on;
    speakingBar.classList.toggle('active', on);
    mainBtns.style.display = on ? 'none' : 'grid';
    stopRow.style.display  = on ? 'grid' : 'none';
  }

  // ── Buttons ──
  btnReadAll.addEventListener('click',  () => speak(editor.value));
  btnReadSel.addEventListener('click',  () => {
    const sel = editor.value.substring(editor.selectionStart, editor.selectionEnd).trim();
    sel ? speak(sel) : alert('Marker teksten du vil høre, og trykk «Markert».');
  });
  btnReadLast.addEventListener('click', () => {
    const t = editor.value.trim();
    if (!t) { alert('Ingen tekst å lese.'); return; }
    const parts = t.match(/[^.!?\n]+[.!?\n]?/g) || [t];
    speak(parts[parts.length - 1]);
  });
  btnStop.addEventListener('click', () => {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    setSpeaking(false);
  });

  updateStats();
  editor.value = '';
</script>
</body>
</html>
